<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('預約管理 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <div
          class="alert alert-success"
          th:if="${successMsg}"
          th:text="${successMsg}"
        ></div>
        <div class="alert alert-error" th:if="${param.error}">
          您沒有權限執行此操作
        </div>
        <div class="action-bar">
          <h2>預約管理</h2>
          <a href="/appointments/new" class="btn" th:if="${user.customer}"
            >＋ 新增預約</a
          >
        </div>
        <table>
          <thead>
            <tr>
              <th>預約編號</th>
              <th>飼主</th>
              <th>寵物</th>
              <th>日期</th>
              <th>時間</th>
              <th>項目</th>
              <th>金額</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${appointments == null or appointments.isEmpty()}">
              <td
                colspan="9"
                style="text-align: center; color: #aaa; padding: 2rem"
              >
                目前沒有預約紀錄
              </td>
            </tr>
            <tr th:each="a : ${appointments}">
              <td th:text="${a.appointmentCode}"></td>
              <td th:text="${a.ownerName}"></td>
              <td th:text="${a.petName + ' (' + a.petType + ')'}"></td>
              <td th:text="${a.date}"></td>
              <td th:text="${a.startTime + ' ~ ' + a.endTime}"></td>

              <td>
                <div
                  th:each="item : ${a.selectedItems}"
                  th:text="${item.name}"
                  style="font-size: 13px; margin-bottom: 2px"
                >
                  美容項目名稱
                </div>
              </td>

              <td th:text="${'$' + a.totalAmount}"></td>
              <td>
                <span class="badge paid" th:if="${a.paid}">已結帳</span>
                <span class="badge unpaid" th:unless="${a.paid}">未結帳</span>
              </td>
              <td>
                <a
                  th:unless="${a.paid}"
                  th:href="@{/payments/checkout/{id}(id=${a.id})}"
                  style="
                    font-size: 12px;
                    color: #555;
                    text-decoration: underline;
                  "
                  >結帳</a
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
