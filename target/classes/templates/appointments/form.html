<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head th:replace="~{fragments/header :: common-head('新增預約 | 寵物美容系統')}"></head>

  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">
        <h2>新增預約</h2>

        <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <div class="card" th:if="${myPets == null or myPets.isEmpty()}" style="text-align: center; padding: 3rem 2rem">
          <div style="font-size: 3rem; margin-bottom: 1rem">🐾</div>
          <h3 style="color: var(--brown-dark); margin-bottom: 8px">您名下尚未登記任何寵物</h3>
          <p style="color: var(--brown-light); font-size: 14px; margin-bottom: 1.5rem;">
            需要先有寵物資料，才能為牠預約美容服務喔！
          </p>
          <a href="/pets/new" class="btn btn-primary" style="display: inline-block; text-decoration: none">✨ 立即前往新增寵物</a>
        </div>

        <div class="card" th:unless="${myPets == null or myPets.isEmpty()}">
          <form method="post" th:action="@{/appointments/submit}">
            
            <div class="field">
              <label>選擇寵物 *</label>
              <select name="petId" required>
                <option value="" disabled selected>請選擇您的寵物</option>
                <option th:each="pet : ${myPets}" th:value="${pet.id}" th:text="${pet.name}"></option>
              </select>
              <p style="font-size: 12px; color: var(--brown-light); margin-top: 6px;">
                沒看到您的寶貝？
                <a href="/pets/new" style="color: var(--brown-dark); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--brown-light);">前往新增寵物</a>
              </p>
            </div>

            <div class="field">
              <label>預約日期 *</label>
              <input type="date" name="date" th:value="${appointmentRequest?.date}" th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required />
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem;">
              
              <div class="field">
                <label>開始時間 * <span style="font-size: 11px; color: var(--brown-light); font-weight: normal;">（11:00～19:00）</span></label>
                <input type="time" name="startTime" th:value="${appointmentRequest?.startTime}" min="11:00" max="19:00" required />
              </div>
              
              <div class="field">
                <label>結束時間 *</label>
                <input type="time" name="endTime" th:value="${appointmentRequest?.endTime}" min="11:00" max="19:00" required />
              </div> </div> <div class="field" style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--brown-dark);">
                美容服務項目 *（可多選）
              </label>
              
              <div style="
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
                gap: 12px; 
                padding: 0.8rem;
                background-color: var(--cream-100);
                border: 1px solid var(--cream-300);
                border-radius: 8px;
                box-sizing: border-box;
              ">
                <label th:each="item : ${groomingItems}" 
                       style="
                         display: flex; 
                         align-items: center; 
                         justify-content: space-between;
                         padding: 10px 14px; 
                         background-color: #ffffff; 
                         border: 1px solid var(--cream-200); 
                         border-radius: 6px; 
                         cursor: pointer;
                         transition: all 0.2s;
                       ">
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="selectedItems" th:value="${item.itemCode}" style="width: 16px; height: 16px; accent-color: var(--brown-dark); cursor: pointer;" />
                    <span th:text="${item.name}" style="font-weight: 500; color: var(--brown-dark);">項目名稱</span>
                  </div>
                  <span th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 0)}" style="color: #2e7d32; font-weight: 600;">$150</span>
                </label>
              </div>
            </div>

            <div style="display: flex; gap: 12px; align-items: center; margin-top: 1.5rem;">
              <button type="submit" class="btn btn-primary" style="padding: 10px 24px; min-width: auto; height: auto;">
                確認送出預約
              </button>
              <a href="/appointments" class="btn btn-secondary" style="padding: 10px 24px; min-width: auto; height: auto; text-decoration: none; text-align: center;">
                取消
              </a>
            </div>

          </form>
        </div>

      </div>
    </div>
  </body>
</html>
