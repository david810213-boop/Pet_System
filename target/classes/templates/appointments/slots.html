<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('可用時段 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <a href="/appointments/new" class="btn">← 返回預約</a>
        <h2>可用時段</h2>
        <p class="date-label">
          日期：<strong th:text="${selectedDate}"></strong>
        </p>
        <div th:each="slot : ${slots}" class="slot">
          <span th:text="${slot.startTime + ' ~ ' + slot.endTime}"></span>
          <span class="avail" th:if="${slot.available}">✓ 可預約</span>
          <span class="taken" th:unless="${slot.available}">✗ 已被預約</span>
        </div>
      </div>
    </div>
  </body>
</html>
