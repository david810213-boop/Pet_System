<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('交易紀錄 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <div
          class="alert-success"
          th:if="${successMsg}"
          th:text="${successMsg}"
        ></div>
        <h2>交易紀錄</h2>
        <table>
          <thead>
            <tr>
              <th>預約編號</th>
              <th>付款方式</th>
              <th>原始金額</th>
              <th>實付金額</th>
              <th>付款時間</th>
              <th>經手人</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${transactions == null or transactions.isEmpty()}">
              <td
                colspan="6"
                style="text-align: center; color: #aaa; padding: 2rem"
              >
                目前沒有交易紀錄
              </td>
            </tr>
            <tr th:each="t : ${transactions}">
              <td th:text="${t.appointmentCode}"></td>
              <td th:text="${t.paymentMethod?.name()}"></td>
              <td th:text="${'$' + t.baseAmount}"></td>
              <td th:text="${'$' + t.finalAmount}"></td>
              <td th:text="${t.paymentTime}"></td>
              <td th:text="${t.handledBy}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
