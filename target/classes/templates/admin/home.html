<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('後台管理 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">
        <div
          class="alert alert-success"
          th:if="${successMsg}"
          th:text="${successMsg}"
        ></div>
        <div
          class="alert alert-error"
          th:if="${errorMsg}"
          th:text="${errorMsg}"
        ></div>

        <div class="action-bar" style="margin-bottom: 1.5rem">
          <a
            th:href="@{/admin/report}"
            class="btn btn-outline"
            style="text-decoration: none; padding: 8px 16px"
            >📊 財務報告</a
          >
        </div>

        <div class="card" style="margin-bottom: 2rem; padding: 2rem">
          <h3
            style="
              color: var(--brown-dark);
              margin-bottom: 1.2rem;
              font-size: 18px;
              font-weight: 600;
            "
          >
            新增員工帳號
          </h3>

          <form method="post" th:action="@{/admin/staff/submit}">
            <div
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) auto;
                gap: 16px;
                align-items: start;
              "
            >
              <div class="field" style="margin: 0">
                <label
                  style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: var(--brown-mid);
                    margin-bottom: 6px;
                  "
                  >姓名</label
                >
                <input
                  type="text"
                  name="name"
                  placeholder="王小明"
                  required
                  style="width: 100%"
                />
              </div>

              <div class="field" style="margin: 0">
                <label
                  style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: var(--brown-mid);
                    margin-bottom: 6px;
                  "
                  >帳號 (Email)</label
                >
                <input
                  type="email"
                  name="username"
                  placeholder="staff@example.com"
                  required
                  style="width: 100%"
                />
              </div>

              <div class="field" style="margin: 0">
                <label
                  style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: var(--brown-mid);
                    margin-bottom: 6px;
                  "
                  >密碼</label
                >
                <input
                  type="password"
                  name="password"
                  placeholder="•••••"
                  required
                  style="width: 100%"
                />
              </div>

              <div class="field" style="margin: 0">
                <label
                  style="
                    display: block;
                    font-size: 13px;
                    margin-bottom: 6px;
                    visibility: hidden;
                  "
                  >對齊佔位</label
                >
                <button
                  type="submit"
                  class="btn btn-primary"
                  style="padding: 10px 24px; white-space: nowrap"
                >
                  新增
                </button>
              </div>
            </div>
          </form>
        </div>

        <div
          class="card"
          style="
            margin-bottom: 2rem;
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--cream-300);
          "
        >
          <div style="display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 1.5rem 0.5rem 1.5rem;">
            <h3 style="color: var(--brown-dark); font-size: 18px; font-weight: 600; margin: 0;">
              ✂️ 美容服務項目價目管理
            </h3>
          </div>

          <div style="background-color: var(--cream-100); padding: 1rem 1.5rem; border-bottom: 1px solid var(--cream-300);">
            <h4 style="font-size: 13px; color: var(--brown-dark); margin-bottom: 0.8rem; font-weight: 600;">➕ 新增美容項目</h4>
            <form method="post" th:action="@{/admin/grooming/submit}" th:object="${groomingItemRequest}">
              <div style="display: grid; grid-template-columns: 100px 180px 1fr 120px auto; gap: 12px; align-items: end;">
                
                <div class="field" style="margin: 0">
                  <label style="display: block; font-size: 12px; color: var(--brown-mid); margin-bottom: 4px;">項目代碼</label>
                  <input type="text" name="itemCode" placeholder="如 GS006" required style="width: 100%; padding: 6px;" />
                </div>

                <div class="field" style="margin: 0">
                  <label style="display: block; font-size: 12px; color: var(--brown-mid); margin-bottom: 4px;">項目名稱</label>
                  <input type="text" name="name" placeholder="如 大型犬大修" required style="width: 100%; padding: 6px;" />
                </div>

                <div class="field" style="margin: 0">
                  <label style="display: block; font-size: 12px; color: var(--brown-mid); margin-bottom: 4px;">說明描述</label>
                  <input type="text" name="description" placeholder="輸入服務內容描述..." style="width: 100%; padding: 6px;" />
                </div>

                <div class="field" style="margin: 0">
                  <label style="display: block; font-size: 12px; color: var(--brown-mid); margin-bottom: 4px;">定價 (元)</label>
                  <input type="number" name="price" placeholder="1000" required min="1" style="width: 100%; padding: 6px;" />
                </div>

                <button type="submit" class="btn btn-primary" style="padding: 8px 16px; font-size: 13px; white-space: nowrap; background-color: var(--brown-dark); color: white; border: none; border-radius: 4px; cursor: pointer;">
                  建立項目
                </button>
              </div>
            </form>
          </div>

          <table
            style="
              width: 100%;
              border-collapse: collapse;
              font-size: 14px;
              text-align: left;
            "
          >
            <thead>
              <tr
                style="
                  background-color: var(--cream-200);
                  color: var(--brown-dark);
                  border-bottom: 1px solid var(--cream-300);
                "
              >
                <th style="padding: 12px 16px; font-weight: 600; width: 100px">代碼</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 150px">項目名稱</th>
                <th style="padding: 12px 16px; font-weight: 600">說明描述</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 100px">目前價格</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 220px">快速調整金額</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 90px; text-align: center;">操作</th>
              </tr>
            </thead>
            <tbody style="color: var(--brown-mid)">
              <tr th:if="${groomingItems == null or groomingItems.isEmpty()}">
                <td
                  colspan="6"
                  style="
                    text-align: center;
                    color: var(--brown-light);
                    padding: 2rem 16px;
                    background: #fff;
                  "
                >
                  📭 目前沒有任何動態服務項目，請在上方新增您的第一筆服務！
                </td>
              </tr>
              <tr
                th:each="item : ${groomingItems}"
                style="
                  border-bottom: 1px solid var(--cream-200);
                  background: #fff;
                "
              >
                <td style="padding: 12px 16px; font-family: monospace;" th:text="${item.itemCode}">GS001</td>
                <td
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--brown-dark);
                  "
                  th:text="${item.name}"
                ></td>
                <td style="padding: 12px 16px;" th:text="${item.description != null ? item.description : '暫無描述'}"></td>
                <td style="padding: 12px 16px; font-weight: 600; color: #2e7d32;" th:text="'$' + ${item.price}"></td>
                
                <td style="padding: 8px 16px">
                  <form th:action="@{/admin/grooming/update/{id}(id=${item.id})}" method="post" style="display: flex; gap: 8px; align-items: center; margin: 0;">
                    <input type="hidden" name="name" th:value="${item.name}" />
                    <input type="hidden" name="description" th:value="${item.description}" />
                    
                    <input
                      type="number"
                      name="price"
                      th:value="${item.price}"
                      required
                      min="1"
                      style="width: 90px; padding: 4px 8px; font-size: 13px; border: 1px solid var(--cream-300); border-radius: 4px;"
                    />
                    <button type="submit" class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; white-space: nowrap;">
                      儲存價格
                    </button>
                  </form>
                </td>
                
                <td style="padding: 12px 16px; text-align: center;">
                  <form th:action="@{/admin/grooming/delete/{id}(id=${item.id})}" method="post" style="margin:0;">
                    <button
                      type="submit"
                      class="btn"
                      style="padding: 4px 10px; font-size: 12px; background-color: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer;"
                      onclick="return confirm('確定要下架此美容項目嗎？')"
                    >
                      下架
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          class="card"
          style="
            margin-bottom: 2rem;
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--cream-300);
          "
        >
          <h3
            style="
              color: var(--brown-dark);
              padding: 1.2rem 1.5rem 0.5rem 1.5rem;
              font-size: 18px;
              font-weight: 600;
            "
          >
            員工清單
          </h3>
          <table
            style="
              width: 100%;
              border-collapse: collapse;
              font-size: 14px;
              text-align: left;
              margin-top: 0.5rem;
            "
          >
            <thead>
              <tr
                style="
                  background-color: var(--cream-200);
                  color: var(--brown-dark);
                  border-bottom: 1px solid var(--cream-300);
                "
              >
                <th style="padding: 12px 16px; font-weight: 600; width: 80px">
                  ID
                </th>
                <th style="padding: 12px 16px; font-weight: 600">姓名</th>
                <th style="padding: 12px 16px; font-weight: 600">帳號</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 120px">
                  角色
                </th>
              </tr>
            </thead>
            <tbody style="color: var(--brown-mid)">
              <tr th:if="${allStaff == null or allStaff.isEmpty()}">
                <td
                  colspan="4"
                  style="
                    text-align: center;
                    color: var(--brown-light);
                    padding: 2rem 16px;
                    background: #fff;
                  "
                >
                  📭 目前沒有員工
                </td>
              </tr>
              <tr
                th:each="s : ${allStaff}"
                style="
                  border-bottom: 1px solid var(--cream-200);
                  background: #fff;
                "
              >
                <td style="padding: 12px 16px" th:text="${s.id}"></td>
                <td
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--brown-dark);
                  "
                  th:text="${s.name}"
                ></td>
                <td style="padding: 12px 16px" th:text="${s.username}"></td>
                <td style="padding: 12px 16px">
                  <span
                    style="
                      font-size: 12px;
                      padding: 2px 8px;
                      background-color: var(--cream-100);
                      border: 1px solid var(--cream-300);
                      border-radius: 4px;
                    "
                    th:text="${s.role}"
                  ></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          class="card"
          style="
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--cream-300);
          "
        >
          <h3
            style="
              color: var(--brown-dark);
              padding: 1.2rem 1.5rem 0.5rem 1.5rem;
              font-size: 18px;
              font-weight: 600;
            "
          >
            所有使用者
          </h3>
          <table
            style="
              width: 100%;
              border-collapse: collapse;
              font-size: 14px;
              text-align: left;
              margin-top: 0.5rem;
            "
          >
            <thead>
              <tr
                style="
                  background-color: var(--cream-200);
                  color: var(--brown-dark);
                  border-bottom: 1px solid var(--cream-300);
                "
              >
                <th style="padding: 12px 16px; font-weight: 600; width: 80px">
                  ID
                </th>
                <th style="padding: 12px 16px; font-weight: 600">姓名</th>
                <th style="padding: 12px 16px; font-weight: 600">帳號</th>
                <th style="padding: 12px 16px; font-weight: 600; width: 120px">
                  角色
                </th>
              </tr>
            </thead>
            <tbody style="color: var(--brown-mid)">
              <tr
                th:each="u : ${allUsers}"
                style="
                  border-bottom: 1px solid var(--cream-200);
                  background: #fff;
                "
              >
                <td style="padding: 12px 16px" th:text="${u.id}"></td>
                <td
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--brown-dark);
                  "
                  th:text="${u.name}"
                ></td>
                <td style="padding: 12px 16px" th:text="${u.username}"></td>
                <td style="padding: 12px 16px">
                  <span
                    style="
                      font-size: 12px;
                      padding: 2px 8px;
                      background-color: var(--cream-100);
                      border: 1px solid var(--cream-300);
                      border-radius: 4px;
                    "
                    th:text="${u.role}"
                  ></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
