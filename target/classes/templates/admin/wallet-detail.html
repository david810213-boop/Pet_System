<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head th:replace="~{fragments/header :: common-head('顧客錢包 | 寵物美容系統')}"></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">

        <!-- 返回按鈕 -->
        <a href="/admin/wallets" class="btn btn-outline" style="margin-bottom:1rem; display:inline-block;">← 返回列表</a>

        <!-- 成功/失敗訊息 -->
        <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
        <div class="alert alert-danger"  th:if="${errorMsg}"   th:text="${errorMsg}"></div>

        <!-- 顧客資訊卡 -->
        <div style="display:flex; gap:1.5rem; margin-bottom:1.5rem; flex-wrap:wrap;">

          <!-- 左：會員卡狀態 -->
          <div style="flex:1; min-width:280px; background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <h3 style="margin-bottom:12px; font-size:15px; color:#666;">👤 顧客資訊</h3>
            <div style="font-size:20px; font-weight:700; color:#2c1810;" th:text="${customer.name}">姓名</div>
            <div style="font-size:13px; color:#999; margin-top:4px;" th:text="${customer.username}">帳號</div>

            <hr style="margin:16px 0; border:none; border-top:1px solid #f0e8dc;">

            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
              <span style="font-size:13px; color:#666;">會員等級</span>
              <span th:text="${wallet.cardTierLabel}"
                    style="background:linear-gradient(135deg,#c9a84c,#f5d49a); color:#2c1810; font-weight:700; font-size:13px; padding:3px 12px; border-radius:20px;">等級</span>
            </div>

            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
              <span style="font-size:13px; color:#666;">服務折扣</span>
              <span style="font-size:15px; font-weight:700; color:#c9a84c;"
                    th:text="${wallet.discount < 1.0 ? (wallet.cardActive ? (wallet.discount * 100 + '折') : '已到期') : '無折扣'}">折扣</span>
            </div>

            <div style="display:flex; align-items:center; gap:10px;" th:if="${wallet.cardExpiresAt != null}">
              <span style="font-size:13px; color:#666;">到期日</span>
              <span style="font-size:13px;" th:text="${wallet.cardExpiresAt}">日期</span>
              <span th:if="${!wallet.cardActive}" style="color:#e53935; font-size:12px;">（已到期）</span>
            </div>
          </div>

          <!-- 右：餘額與儲值表單 -->
          <div style="flex:1; min-width:280px; background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <h3 style="margin-bottom:12px; font-size:15px; color:#666;">💰 儲值金餘額</h3>
            <div style="font-size:36px; font-weight:700; color:#2c1810;">
              $<span th:text="${#numbers.formatInteger(wallet.balance, 0, 'COMMA')}">0</span>
            </div>

            <hr style="margin:16px 0; border:none; border-top:1px solid #f0e8dc;">

            <h4 style="font-size:14px; color:#666; margin-bottom:12px;">＋ 新增儲值</h4>
            <form th:action="@{/admin/wallets/{u}/deposit(u=${customer.username})}"
                  method="post" style="display:flex; flex-direction:column; gap:10px;">

              <!-- 快速金額按鈕 -->
              <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <button type="button" class="btn btn-outline"
                        onclick="setAmount(5000)" style="padding:4px 10px; font-size:13px;">$5,000</button>
                <button type="button" class="btn btn-outline"
                        onclick="setAmount(8000)" style="padding:4px 10px; font-size:13px;">$8,000</button>
                <button type="button" class="btn btn-outline"
                        onclick="setAmount(15000)" style="padding:4px 10px; font-size:13px;">$15,000</button>
                <button type="button" class="btn btn-outline"
                        onclick="setAmount(30000)" style="padding:4px 10px; font-size:13px;">$30,000</button>
                <button type="button" class="btn btn-outline"
                        onclick="setAmount(50000)" style="padding:4px 10px; font-size:13px;">$50,000</button>
              </div>

              <input type="number" id="amountInput" name="amount" min="1" placeholder="輸入儲值金額"
                     style="padding:8px 12px; border:1px solid var(--cream-300); border-radius:var(--radius-sm); font-size:15px;"
                     required />
              <input type="text" name="note" placeholder="備註（選填，例如：現金儲值）"
                     style="padding:8px 12px; border:1px solid var(--cream-300); border-radius:var(--radius-sm); font-size:13px;" />
              <button type="submit" class="btn">確認儲值</button>
            </form>
          </div>
        </div>

        <!-- 會員等級對照表 -->
        <div style="background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:1.5rem;">
          <h3 style="margin-bottom:12px; font-size:15px; color:#666;">📋 會員等級說明</h3>
          <table>
            <thead>
              <tr>
                <th>等級</th>
                <th>單筆儲值門檻</th>
                <th>服務折扣</th>
                <th>商品會員價</th>
              </tr>
            </thead>
            <tbody>
              <tr><td>村民優惠方案</td><td>$5,000</td><td>贈 $200</td><td>—</td></tr>
              <tr><td>普卡</td><td>$8,000</td><td>95折</td><td>✓</td></tr>
              <tr><td>金卡</td><td>$15,000</td><td>9折</td><td>✓</td></tr>
              <tr><td>鑽石卡</td><td>$30,000</td><td>88折</td><td>✓</td></tr>
              <tr><td>慕沐村VIP</td><td>$50,000</td><td>85折</td><td>✓</td></tr>
            </tbody>
          </table>
        </div>

        <!-- 異動紀錄 -->
        <div style="background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <h3 style="margin-bottom:12px; font-size:15px; color:#666;">📜 儲值與消費紀錄</h3>
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>類型</th>
                <th>金額</th>
                <th>異動後餘額</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(transactions)}">
                <td colspan="5" style="text-align:center; color:#aaa;">尚無紀錄</td>
              </tr>
              <tr th:each="tx : ${transactions}">
                <td th:text="${#temporals.format(tx.createdAt, 'yyyy/MM/dd HH:mm')}">時間</td>
                <td th:text="${tx.typeLabel}">類型</td>
                <td>
                  <span th:if="${tx.amount > 0}"
                        style="color:#43a047; font-weight:700;"
                        th:text="'+$' + ${#numbers.formatInteger(tx.amount, 0, 'COMMA')}">+$0</span>
                  <span th:if="${tx.amount < 0}"
                        style="color:#e53935; font-weight:700;"
                        th:text="'-$' + ${#numbers.formatInteger(-tx.amount, 0, 'COMMA')}">-$0</span>
                </td>
                <td th:text="'$' + ${#numbers.formatInteger(tx.balanceAfter, 0, 'COMMA')}">$0</td>
                <td th:text="${tx.note}">備註</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <script>
      function setAmount(val) {
        document.getElementById('amountInput').value = val;
      }
    </script>
  </body>
</html>
