<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel=\"icon\" type=\"image/svg+xml\" href=\"/favicon.svg\">
  <link rel=\"shortcut icon\" href=\"/favicon.svg\">
  <title>登入 | 寵物美容系統</title>
  
  <style>
    /* 🎨 帶入全站奶油共用變數 */
    :root {
      --white-warm: #FAF8F5;
      --cream-100: #FDFBF7;
      --cream-200: #F7F3EB;
      --cream-300: #EFE9DC;
      --brown-dark: #4A3E3D;
      --brown-mid: #706261;
      --brown-light: #A39391;
      --shadow-sm: 0 2px 8px rgba(112, 98, 97, 0.06);
      --shadow-md: 0 10px 30px rgba(112, 98, 97, 0.08);
      --radius-md: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ✨ 完美保留置中，背景升級為暖白奶油底 + 柔和雙層光暈背景 */
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: radial-gradient(circle at 10% 20%, rgba(247, 243, 235, 0.7) 0%, transparent 50%),
                  radial-gradient(circle at 90% 80%, rgba(239, 233, 220, 0.5) 0%, transparent 50%),
                  var(--white-warm);
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
    }
    
    /* 🥮 登入卡片升級：加上溫潤的厚實陰影與大地色細邊框 */
    .card { 
      background: #ffffff; 
      border: 1px solid var(--cream-300); 
      border-radius: var(--radius-md); 
      padding: 2.5rem 2.2rem; 
      width: 100%; 
      max-width: 390px; 
      box-shadow: var(--shadow-md);
    }
    
    /* 字體顏色微調為可可色 */
    h1 { font-size: 24px; font-weight: 700; color: var(--brown-dark); margin-bottom: 8px; letter-spacing: -0.5px; }
    p.sub { font-size: 14px; color: var(--brown-light); margin-bottom: 1.8rem; }
    label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--brown-mid); }
    
    /* ⌨️ 輸入框升級：柔和的暖棕色外框與 Focus 特效 */
    input[type=email], input[type=password], input[type=text] {
      width: 100%; 
      padding: 10px 14px; 
      border: 1px solid var(--cream-300); 
      background-color: var(--cream-100);
      border-radius: var(--radius-sm); 
      font-size: 14px; 
      color: var(--brown-dark);
      outline: none; 
      transition: all 0.2s ease;
    }
    input[type=email]::placeholder, input[type=password]::placeholder {
      color: var(--brown-light);
      opacity: 0.6;
    }
    input:focus { 
      border-color: var(--brown-mid); 
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(112, 98, 97, 0.1);
    }
    
    .field { margin-bottom: 1.2rem; }
    
    /* 🪵 按鈕升級：改為飽滿深可可色（慕沐村主按鈕色） */
    .btn { 
      width: 100%; 
      padding: 11px; 
      background: var(--brown-dark); 
      color: #fff; 
      font-size: 14px; 
      font-weight: 600; 
      border: none; 
      border-radius: var(--radius-sm); 
      cursor: pointer; 
      margin-top: 0.6rem; 
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(74, 62, 61, 0.15);
    }
    .btn:hover { 
      background: var(--brown-mid); 
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(74, 62, 61, 0.2);
    }
    .btn:active {
      transform: translateY(0);
    }
    
    /* 🔔 提示框改為柔和暖調粉與暖調綠 */
    .alert { font-size: 13px; padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 1.2rem; font-weight: 500; }
    .alert-error { background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; }
    .alert-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    
    /* 下方連結改為深可可色襯托 */
    .link-row { font-size: 13px; color: var(--brown-mid); text-align: center; margin-top: 1.5rem; }
    .link-row a { color: var(--brown-dark); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--brown-light); padding-bottom: 2px; }
    .link-row a:hover { color: var(--brown-mid); border-bottom-style: solid; }
  </style>
</head>
<body>

<div class="card">
  <h1>🐾 歡迎回來</h1>
  <p class="sub">請登入您的系統帳號</p>

  <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
  <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

  <form method="post" action="/auth/login/submit">
    <input type="hidden" name="redirect" th:value="${redirect}"/>

    <div class="field">
      <label for="username">帳號（Email）</label>
      <input type="email" id="username" name="username" placeholder="請輸入您的 Email" required />
    </div>

    <div class="field">
      <label for="password">密碼</label>
      <input type="password" id="password" name="password" placeholder="請輸入密碼" required />
    </div>

    <button type="submit" class="btn">安全登入</button>
  </form>

  <div class="link-row">
    還沒有帳號嗎？ <a href="/auth/register">立即建立帳號</a>
  </div>
</div>

</body>
</html>
