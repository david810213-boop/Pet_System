spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:petdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[hibernate.format_sql]": true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

# 日誌配置（開發環境輸出較多細節）
logging:
  level:
    "[com.petgrooming.pet_system]": DEBUG
    "[org.springframework.web]": INFO
    "[org.hibernate]": INFO

server:
  port: 8081
  tomcat:
    relaxed-path-chars: [':']
    relaxed-query-chars: [':']

# LINE Login 設定（在 LINE Developers Console 建立 LINE Login Channel 後取得）
line:
  channel-id: ${LINE_CHANNEL_ID:your-line-login-channel-id}
