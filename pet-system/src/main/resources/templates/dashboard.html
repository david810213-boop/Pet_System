<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('首頁 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <!-- 共用導覽列 -->
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">
        <div
          class="alert alert-success"
          th:if="${successMsg}"
          th:text="${successMsg}"
        ></div>

        <p class="welcome">
          歡迎回來，<strong th:text="${user.name}"></strong>！
          <span
            th:text="${user.role == T(com.petgrooming.pet_system.enums.UserRole).ADMIN ? '（管理員）' :
                      user.role == T(com.petgrooming.pet_system.enums.UserRole).STAFF ? '（員工）' : ''}"
          ></span>
        </p>

        <!-- CUSTOMER：顯示快速統計 -->
        <div th:if="${user.customer}">
          <div class="cards">
            <div class="stat-card">
              <div class="label">我的預約</div>
              <div class="value" th:text="${appointments?.size() ?: 0}">0</div>
            </div>
            <div class="stat-card">
              <div class="label">我的寵物</div>
              <div class="value" th:text="${pets?.size() ?: 0}">0</div>
            </div>
          </div>

          <div class="action-bar">
            <a href="/appointments/new" class="btn">＋ 新增預約</a>
            <a href="/pets/new" class="btn btn-outline">＋ 新增寵物</a>
          </div>
        </div>

        <!-- STAFF / ADMIN：顯示所有預約 -->
        <div th:if="${user.staffOrAdmin}">
          <div class="action-bar">
            <a href="/admin/report" class="btn" th:if="${user.admin}"
              >財務報告</a
            >
            <a href="/admin" class="btn btn-outline" th:if="${user.admin}"
              >管理後台</a
            >
          </div>
        </div>

        <!-- 預約清單 -->
        <h2>近期預約</h2>
        <table>
          <thead>
            <tr>
              <th>預約編號</th>
              <th>寵物名稱</th>
              <th>日期</th>
              <th>時間</th>
              <th>金額</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${appointments == null or appointments.isEmpty()}">
              <td
                colspan="7"
                style="text-align: center; color: #aaa; padding: 2rem"
              >
                目前沒有預約紀錄
              </td>
            </tr>
            <tr th:each="a : ${appointments}">
              <td th:text="${a.appointmentCode}">AP001</td>
              <td th:text="${a.petName}">小白</td>
              <td th:text="${a.date}">2025-06-01</td>
              <td th:text="${a.startTime + ' ~ ' + a.endTime}">11:00~13:00</td>
              <td th:text="${'$' + a.totalAmount}">$500</td>
              <td>
                <span class="badge badge-paid" th:if="${a.paid}">已結帳</span>
                <span class="badge badge-unpaid" th:unless="${a.paid}"
                  >未結帳</span
                >
              </td>
              <td>
                <a
                  th:unless="${a.paid}"
                  th:href="@{/payments/checkout/{id}(id=${a.id})}"
                  style="
                    font-size: 12px;
                    color: #555;
                    text-decoration: underline;
                  "
                  >結帳</a
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
