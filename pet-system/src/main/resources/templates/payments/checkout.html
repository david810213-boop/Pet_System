<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('結帳 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <h2>結帳</h2>
        <div
          class="alert-error"
          th:if="${errorMsg}"
          th:text="${errorMsg}"
        ></div>

        <div class="card">
          <form
            method="post"
            th:action="@{/payments/checkout/{id}/submit(id=${appointmentId})}"
          >
            <div class="field">
              <label>付款方式</label>
              <select name="paymentMethod" required>
                <option value="" disabled selected>請選擇付款方式</option>
                <option
                  th:each="m : ${paymentMethods}"
                  th:value="${m.name()}"
                  th:text="${m.name() == 'CASH' ? '現金' : m.name() == 'CREDIT_CARD' ? '信用卡（加收 2%）' : 'Line Pay'}"
                  th:selected="${checkoutRequest?.paymentMethod?.name() == m.name()}"
                ></option>
              </select>
              <p class="method-hint">
                不同付款方式手續費不同，結帳後可於交易紀錄查看實付金額。
              </p>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 0.5rem">
              <button type="submit" class="btn">確認付款</button>
              <a href="/appointments" class="btn btn-outline">取消</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
