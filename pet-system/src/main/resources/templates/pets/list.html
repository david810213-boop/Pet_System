<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('我的寵物 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <div
          class="alert alert-success"
          th:if="${successMsg}"
          th:text="${successMsg}"
        ></div>
        <div class="action-bar">
          <h2>我的寵物</h2>
          <a href="/pets/new" class="btn">＋ 新增寵物</a>
        </div>
        <div th:if="${pets == null or pets.isEmpty()}" class="empty">
          <p>還沒有登記寵物，點擊右上角新增！</p>
        </div>
        <div class="cards" th:unless="${pets == null or pets.isEmpty()}">
          <div class="pet-card" th:each="p : ${pets}">
            <span class="type-tag" th:text="${p.petTypeLabel}">狗</span>
            <h3 th:text="${p.name}">小白</h3>
            <p>品種：<span th:text="${p.breed}"></span></p>
            <p>體重：<span th:text="${p.weight + ' kg'}"></span></p>
            <p>年齡：<span th:text="${p.age + ' 歲'}"></span></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
