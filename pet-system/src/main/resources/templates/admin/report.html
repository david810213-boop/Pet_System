<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('財務報告 | 寵物美容系統')}"
  ></head>

  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">
        <a
          href="/admin"
          class="btn btn-outline"
          style="margin-bottom: 1.5rem; text-decoration: none"
          >← 返回後台</a
        >

        <h2>財務報告</h2>
        <p
          class="gen-time"
          style="
            font-size: 13px;
            color: var(--brown-light);
            margin-top: -4px;
            margin-bottom: 1.5rem;
          "
        >
          產出時間：<span th:text="${report.generatedAt}"></span>
        </p>

        <div
          class="stats"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 2rem;
          "
        >
          <div class="card" style="padding: 1.2rem 1.5rem">
            <div
              style="
                font-size: 12px;
                color: var(--brown-light);
                font-weight: 500;
                margin-bottom: 6px;
              "
            >
              總交易筆數
            </div>
            <div
              style="
                font-size: 28px;
                font-weight: 700;
                color: var(--brown-dark);
              "
              th:text="${report.totalTransactions}"
            >
              0
            </div>
          </div>

          <div class="card" style="padding: 1.2rem 1.5rem">
            <div
              style="
                font-size: 12px;
                color: var(--brown-light);
                font-weight: 500;
                margin-bottom: 6px;
              "
            >
              已付款筆數
            </div>
            <div
              style="
                font-size: 28px;
                font-weight: 700;
                color: var(--brown-dark);
              "
              th:text="${report.paidCount}"
            >
              0
            </div>
          </div>

          <div
            class="card"
            style="
              padding: 1.2rem 1.5rem;
              background-color: var(--cream-100);
              border-color: var(--brown-light);
            "
          >
            <div
              style="
                font-size: 12px;
                color: var(--brown-mid);
                font-weight: 600;
                margin-bottom: 6px;
              "
            >
              💰 總營收
            </div>
            <div
              style="
                font-size: 28px;
                font-weight: 800;
                color: var(--brown-dark);
              "
              th:text="${'$' + #numbers.formatInteger(report.totalRevenue, 0)}"
            >
              $0
            </div>
          </div>

          <div class="card" style="padding: 1.2rem 1.5rem">
            <div
              style="
                font-size: 12px;
                color: var(--brown-light);
                font-weight: 500;
                margin-bottom: 6px;
              "
            >
              平均客單價
            </div>
            <div
              style="
                font-size: 28px;
                font-weight: 700;
                color: var(--brown-dark);
              "
              th:text="${'$' + #numbers.formatInteger(report.averageAmount, 0)}"
            >
              $0
            </div>
          </div>
        </div>

        <div
          style="
            border: 1px solid var(--cream-300);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #fff;
            box-shadow: var(--shadow-sm);
          "
        >
          <table
            style="
              width: 100%;
              border-collapse: collapse;
              font-size: 14px;
              text-align: left;
            "
          >
            <thead>
              <tr
                style="
                  background-color: var(--cream-200);
                  color: var(--brown-dark);
                  border-bottom: 1px solid var(--cream-300);
                "
              >
                <th style="padding: 12px 16px; font-weight: 600">預約編號</th>
                <th style="padding: 12px 16px; font-weight: 600">付款方式</th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    text-align: right;
                  "
                >
                  原始金額
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    text-align: right;
                  "
                >
                  實付金額
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    text-align: center;
                  "
                >
                  付款時間
                </th>
                <th style="padding: 12px 16px; font-weight: 600">經手人</th>
              </tr>
            </thead>
            <tbody style="color: var(--brown-mid)">
              <tr th:if="${report.details.isEmpty()}">
                <td
                  colspan="6"
                  style="
                    text-align: center;
                    color: var(--brown-light);
                    padding: 3rem 16px;
                    background: #fff;
                  "
                >
                  📭 目前沒有交易紀錄
                </td>
              </tr>

              <tr
                th:each="t : ${report.details}"
                style="
                  border-bottom: 1px solid var(--cream-200);
                  background: #fff;
                  transition: background 0.15s ease;
                "
              >
                <td
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--brown-dark);
                  "
                  th:text="${t.appointmentCode}"
                ></td>
                <td style="padding: 12px 16px">
                  <span
                    style="
                      font-size: 12px;
                      padding: 2px 8px;
                      background-color: var(--cream-100);
                      border: 1px solid var(--cream-300);
                      border-radius: 4px;
                    "
                    th:text="${t.paymentMethod?.name()}"
                  ></span>
                </td>
                <td
                  style="padding: 12px 16px; text-align: right"
                  th:text="${'$' + t.baseAmount}"
                ></td>
                <td
                  style="
                    padding: 12px 16px;
                    text-align: right;
                    font-weight: 600;
                    color: var(--brown-dark);
                  "
                  th:text="${'$' + t.finalAmount}"
                ></td>
                <td
                  style="
                    padding: 12px 16px;
                    text-align: center;
                    font-size: 13px;
                    color: var(--brown-light);
                  "
                  th:text="${t.paymentTime}"
                ></td>
                <td style="padding: 12px 16px" th:text="${t.handledBy}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <style>
      /* 滑過表格行時有淡淡的奶油高亮效果 */
      table tbody tr:hover {
        background-color: var(--cream-100) !important;
      }
    </style>
  </body>
</html>
