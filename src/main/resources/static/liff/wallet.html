<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>慕沐村 會員錢包</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f5f0;
      min-height: 100vh;
    }

    /* 頂部 Header */
    .header {
      background: linear-gradient(135deg, #2c1810, #5c3d2e);
      color: #f5d49a;
      padding: 20px 16px 28px;
      text-align: center;
    }
    .header .logo { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }

    /* 會員卡區塊 */
    .card-section {
      margin: -16px 16px 0;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .card-tier {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .tier-badge {
      background: linear-gradient(135deg, #c9a84c, #f5d49a);
      color: #2c1810;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .tier-badge.none { background: #e0e0e0; color: #666; }
    .tier-badge.village { background: linear-gradient(135deg, #8bc34a, #c5e1a5); color: #33691e; }
    .tier-badge.normal { background: linear-gradient(135deg, #90a4ae, #cfd8dc); color: #37474f; }
    .tier-badge.gold { background: linear-gradient(135deg, #c9a84c, #f5d49a); color: #5d4037; }
    .tier-badge.diamond { background: linear-gradient(135deg, #7986cb, #c5cae9); color: #1a237e; }
    .tier-badge.vip { background: linear-gradient(135deg, #2c1810, #5c3d2e); color: #f5d49a; }

    .card-info { flex: 1; }
    .card-info .discount { font-size: 18px; font-weight: 700; color: #c9a84c; }
    .card-info .expire { font-size: 12px; color: #999; margin-top: 2px; }

    .balance-row {
      border-top: 1px solid #f0e8dc;
      padding-top: 16px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .balance-label { font-size: 13px; color: #666; }
    .balance-amount { font-size: 32px; font-weight: 700; color: #2c1810; }
    .balance-unit { font-size: 14px; color: #666; }

    /* 會員等級進度 */
    .tier-progress {
      margin: 16px 16px 0;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tier-progress h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
    .tier-item {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
      gap: 10px;
    }
    .tier-item:last-child { border-bottom: none; }
    .tier-item .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e0e0e0; flex-shrink: 0;
    }
    .tier-item.active .dot { background: #c9a84c; }
    .tier-item .name { flex: 1; font-size: 14px; }
    .tier-item.active .name { font-weight: 700; color: #2c1810; }
    .tier-item .amount { font-size: 12px; color: #999; }
    .tier-item .perk { font-size: 12px; color: #c9a84c; font-weight: 600; }

    /* 交易紀錄 */
    .transactions {
      margin: 16px 16px 80px;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .transactions h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
    .tx-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; margin-right: 10px; flex-shrink: 0;
    }
    .tx-icon.deposit { background: #e8f5e9; }
    .tx-icon.deduct { background: #fce4ec; }
    .tx-body { flex: 1; }
    .tx-note { font-size: 14px; color: #333; }
    .tx-date { font-size: 11px; color: #bbb; margin-top: 2px; }
    .tx-amount { font-size: 15px; font-weight: 700; }
    .tx-amount.plus { color: #43a047; }
    .tx-amount.minus { color: #e53935; }

    .empty { text-align: center; padding: 24px; color: #bbb; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #bbb; }

    /* 錯誤/提示訊息 */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>
    var vConsole = new window.VConsole();
  </script>
</head>
<body>

<div class="header">
  <div class="logo">慕沐村 Mulage pet</div>
  <h1>會員錢包</h1>
</div>

<div id="app">
  <div class="loading">載入中...</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LIFF_ID = "2010567973-ygHvpq7X"; // ← 你的 LIFF ID
  let jwtToken = null;

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }

      // LINE 登入 → 換發本系統 JWT
      const idToken = liff.getIDToken();
      const res = await fetch('/api/line/login', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true' // 🚀 繞過 ngrok 阻擋
        },
        body: JSON.stringify({ idToken })
      });
      if (!res.ok) { showError('登入失敗，請重試'); return; }
      const data = await res.json();
      jwtToken = data.token;

      await loadWallet();
    } catch (e) {
      showError('初始化失敗：' + e.message);
    }
  }

  async function api(path) {
    const res = await fetch(path, {
      headers: { 
        'Authorization': 'Bearer ' + jwtToken,
        'ngrok-skip-browser-warning': 'true' // 🚀 繞過 ngrok 阻擋
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  async function loadWallet() {
    try {
      const [wallet, txList] = await Promise.all([
        api('/api/wallet'),
        api('/api/wallet/transactions')
      ]);
      render(wallet, txList);
    } catch (e) {
      showError('載入失敗，請重新整理');
    }
  }

  function tierClass(tier) {
    const map = {
      NONE: 'none', VILLAGE: 'village', NORMAL: 'normal',
      GOLD: 'gold', DIAMOND: 'diamond', VIP: 'vip'
    };
    return map[tier] || 'none';
  }

  function discountLabel(discount) {
    if (discount >= 1.0) return '無折扣';
    return Math.round(discount * 100) + '折';
  }

  function render(wallet, txList) {
    const tiers = [
      { key: 'VILLAGE', label: '村民優惠方案', amount: '$5,000', perk: '贈$200' },
      { key: 'NORMAL',  label: '普卡',          amount: '$8,000', perk: '95折' },
      { key: 'GOLD',    label: '金卡',           amount: '$15,000', perk: '9折' },
      { key: 'DIAMOND', label: '鑽石卡',         amount: '$30,000', perk: '88折' },
      { key: 'VIP',     label: '慕沐村VIP',      amount: '$50,000', perk: '85折' },
    ];
    const tierOrder = ['NONE','VILLAGE','NORMAL','GOLD','DIAMOND','VIP'];
    const currentRank = tierOrder.indexOf(wallet.cardTier);

    const expireText = wallet.cardActive
      ? `有效期限至 ${wallet.cardExpiresAt}`
      : (wallet.cardActivatedAt ? '會員資格已到期' : '尚未開卡');

    const discText = wallet.cardActive
      ? discountLabel(wallet.discount)
      : '—';

    const tierHTML = tiers.map(t => {
      const rank = tierOrder.indexOf(t.key);
      const active = rank <= currentRank && currentRank > 0;
      return `
        <div class="tier-item ${active ? 'active' : ''}">
          <div class="dot"></div>
          <div class="name">${t.label}</div>
          <div class="amount">${t.amount}</div>
          <div class="perk">${t.perk}</div>
        </div>`;
    }).join('');

    const txHTML = txList.length === 0
      ? '<div class="empty">暫無消費紀錄</div>'
      : txList.map(tx => {
          const isPlus = tx.amount > 0;
          const icon = isPlus ? '💰' : '🛍️';
          const date = new Date(tx.createdAt).toLocaleDateString('zh-TW');
          return `
            <div class="tx-item">
              <div class="tx-icon ${isPlus ? 'deposit' : 'deduct'}">${icon}</div>
              <div class="tx-body">
                <div class="tx-note">${tx.note || tx.typeLabel}</div>
                <div class="tx-date">${date} 餘額 $${tx.balanceAfter.toLocaleString()}</div>
              </div>
              <div class="tx-amount ${isPlus ? 'plus' : 'minus'}">
                ${isPlus ? '+' : ''}$${Math.abs(tx.amount).toLocaleString()}
              </div>
            </div>`;
        }).join('');

    document.getElementById('app').innerHTML = `
      <div class="card-section">
        <div class="card-tier">
          <div class="tier-badge ${tierClass(wallet.cardTier)}">${wallet.cardTierLabel}</div>
          <div class="card-info">
            <div class="discount">${discText}</div>
            <div class="expire">${expireText}</div>
          </div>
        </div>
        <div class="balance-row">
          <div class="balance-label">儲值餘額</div>
          <div class="balance-amount">$${wallet.balance.toLocaleString()}</div>
          <div class="balance-unit">元</div>
        </div>
      </div>

      <div class="tier-progress">
        <h3>會員等級說明</h3>
        ${tierHTML}
      </div>

      <div class="transactions">
        <h3>消費與儲值紀錄</h3>
        ${txHTML}
      </div>`;
  }

  function showError(msg) {
    // 修改這裡：除了 msg，把具體的錯誤細節或是 Error 物件內容也印出來
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:#e53935; padding:20px; font-size:14px; word-break:break-all; text-align:left;">
        ${msg} <br><br>
        <span style="color:#666;">除錯資訊：</span><br>
        URL: ${window.location.href}
      </div>`;
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
