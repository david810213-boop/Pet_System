<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>LIFF 登入測試頁</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 24px auto; padding: 0 16px; }
    button { display: block; width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
    .ok { color: green; } .err { color: red; }
  </style>
</head>
<body>
  <h2>LIFF 顧客端測試頁</h2>
  <p>用途：在還沒有正式串接前端前，先驗證 LINE 登入 → JWT → 各支顧客 API 是否打得通。</p>

  <label>LIFF ID（在 LINE Developers Console 建立 LIFF App 後取得）</label>
  <input id="liffId" type="text" placeholder="例如 1234567890-AbCdEfGh" style="width:100%;padding:8px;" />
  <button onclick="initAndLogin()">1. 初始化並登入</button>

  <button onclick="callApi('/api/users/me', 'GET')">2. 查詢我的會員資料 /api/users/me</button>
  <button onclick="callApi('/api/pets/my', 'GET')">3. 查詢我的寵物 /api/pets/my</button>
  <button onclick="addPet()">4. 新增一隻測試寵物</button>
  <button onclick="callApi('/api/appointments/my', 'GET')">5. 查詢我的預約 /api/appointments/my</button>

  <h3>結果</h3>
  <pre id="log">尚未執行</pre>

  <script>
    let jwtToken = null;

    function log(label, data) {
      const el = document.getElementById('log');
      el.textContent = `[${label}]\n` + (typeof data === 'string' ? data : JSON.stringify(data, null, 2));
    }

    async function initAndLogin() {
      const liffId = document.getElementById('liffId').value.trim();
      if (!liffId) { alert('請先輸入 LIFF ID'); return; }

      try {
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) {
          liff.login(); // 會跳轉到 LINE 登入頁，登入完成後會帶回本頁
          return;
        }

        const idToken = liff.getIDToken();
        log('liff.getIDToken()', idToken);

        const res = await fetch('/api/line/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken })
        });
        const data = await res.json();

        if (!res.ok) {
          log('登入失敗 (' + res.status + ')', data);
          return;
        }

        jwtToken = data.token;
        log('登入成功', data);
      } catch (e) {
        log('發生例外', e.message || String(e));
      }
    }

    async function callApi(path, method) {
      if (!jwtToken) { alert('請先完成步驟 1 登入'); return; }
      try {
        const res = await fetch(path, {
          method,
          headers: { 'Authorization': 'Bearer ' + jwtToken }
        });
        const data = await res.json().catch(() => res.text());
        log(`${method} ${path} (${res.status})`, data);
      } catch (e) {
        log('發生例外', e.message || String(e));
      }
    }

    async function addPet() {
      if (!jwtToken) { alert('請先完成步驟 1 登入'); return; }
      try {
        const res = await fetch('/api/pets', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + jwtToken
          },
          body: JSON.stringify({
            name: '測試犬_' + Date.now(),
            petType: 'DOG',
            breed: '柴犬',
            weight: 8.5,
            age: 2
          })
        });
        const data = await res.json().catch(() => res.text());
        log(`POST /api/pets (${res.status})`, data);
      } catch (e) {
        log('發生例外', e.message || String(e));
      }
    }
  </script>
</body>
</html>
