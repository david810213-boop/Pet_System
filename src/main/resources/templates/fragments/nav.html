<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <nav
      th:fragment="nav"
      style="
        background: var(--white-warm);
        border-bottom: 1px solid var(--cream-300);
        padding: 0 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        box-shadow: var(--shadow-xs);
      "
    >
      <a
        href="/dashboard"
        style="
          font-weight: 700;
          font-size: 16px;
          text-decoration: none;
          color: var(--brown-dark);
          letter-spacing: -0.3px;
        "
      >
        🐾 寵物美容系統
      </a>

      <div style="display: flex; gap: 1.5rem; align-items: center">
        <a
          href="/appointments"
          style="
            font-size: 14px;
            font-weight: 500;
            color: var(--brown-mid);
            text-decoration: none;
            transition: var(--transition-fast);
          "
          >預約管理</a
        >
        <a
          href="/pets"
          style="
            font-size: 14px;
            font-weight: 500;
            color: var(--brown-mid);
            text-decoration: none;
            transition: var(--transition-fast);
          "
          th:if="${user != null and user.customer}"
          >我的寵物</a
        >
        <a
          href="/payments"
          style="
            font-size: 14px;
            font-weight: 500;
            color: var(--brown-mid);
            text-decoration: none;
            transition: var(--transition-fast);
          "
          >交易紀錄</a
        >
        <a
          href="/admin/wallets"
          style="
            font-size: 14px;
            font-weight: 500;
            color: var(--brown-mid);
            text-decoration: none;
            transition: var(--transition-fast);
          "
          th:if="${user != null and user.staffOrAdmin}"
          >儲值管理</a
        >
        <a
          href="/admin"
          style="
            font-size: 14px;
            font-weight: 500;
            color: var(--brown-mid);
            text-decoration: none;
            transition: var(--transition-fast);
          "
          th:if="${user != null and user.admin}"
          >管理後台</a
        >
      </div>

      <div
        style="display: flex; align-items: center; gap: 12px"
        th:if="${user != null}"
      >
        <span
          style="font-size: 13px; color: var(--brown-mid); font-weight: 500"
        >
          <span th:text="${user.name}">使用者</span>

          <span
            style="font-size: 11px; margin-left: 6px"
            th:class="${user.role.name() == 'ADMIN' ? 'badge badge-admin' : user.role.name() == 'STAFF' ? 'badge badge-staff' : 'badge badge-cust'}"
            th:text="${user.role}"
            >ROLE</span
          >
        </span>

        <a
          href="/auth/logout"
          class="btn btn-outline"
          style="
            padding: 4px 12px;
            font-size: 12px;
            border-radius: var(--radius-sm);
            box-shadow: none;
          "
        >
          登出
        </a>
      </div>
    </nav>
  </body>
</html>
