<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head th:replace="~{fragments/header :: common-head('儲值管理 | 寵物美容系統')}"></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>

      <div class="content">
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h2 style="margin:0">💳 儲值管理</h2>
        </div>

        <!-- 搜尋欄 -->
        <form method="get" action="/admin/wallets"
              style="display:flex; gap:8px; margin-bottom:1.5rem;">
          <input type="text" name="keyword" th:value="${keyword}"
                 placeholder="搜尋顧客姓名或帳號..."
                 style="flex:1; padding:8px 12px; border:1px solid var(--cream-300); border-radius:var(--radius-sm);" />
          <button type="submit" class="btn">搜尋</button>
          <a href="/admin/wallets" class="btn btn-outline">重置</a>
        </form>

        <!-- 顧客列表 -->
        <table>
          <thead>
            <tr>
              <th>顧客姓名</th>
              <th>帳號</th>
              <th>登入方式</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(customers)}">
              <td colspan="4" style="text-align:center; color:#aaa;">尚無顧客資料</td>
            </tr>
            <tr th:each="c : ${customers}">
              <td th:text="${c.name}">姓名</td>
              <td th:text="${c.username}">帳號</td>
              <td>
                <span th:if="${c.lineUserId != null}"
                      style="background:#06c755; color:white; padding:2px 8px; border-radius:10px; font-size:12px;">LINE</span>
                <span th:if="${c.lineUserId == null}"
                      style="background:#888; color:white; padding:2px 8px; border-radius:10px; font-size:12px;">帳密</span>
              </td>
              <td>
                <a th:href="@{/admin/wallets/{u}(u=${c.username})}" class="btn" style="padding:4px 12px; font-size:13px;">
                  查看錢包
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
