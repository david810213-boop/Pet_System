<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <title>建立帳號 | 寵物美容系統</title>

    <style>
      /* 🎨 帶入與 login.html 完全一致的全站奶油共用變數 */
      :root {
        --white-warm: #faf8f5;
        --cream-100: #fdfbf7;
        --cream-200: #f7f3eb;
        --cream-300: #efe9dc;
        --brown-dark: #4a3e3d;
        --brown-mid: #706261;
        --brown-light: #a39391;
        --shadow-sm: 0 2px 8px rgba(112, 98, 97, 0.06);
        --shadow-md: 0 10px 30px rgba(112, 98, 97, 0.08);
        --radius-md: 14px;
        --radius-sm: 8px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ✨ 完美對齊登入頁：絕對水平垂直置中 + 雙層奶油光暈背景 */
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background:
          radial-gradient(
            circle at 10% 20%,
            rgba(247, 243, 235, 0.7) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(239, 233, 220, 0.5) 0%,
            transparent 50%
          ),
          var(--white-warm);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      /* 🥮 註冊卡片：溫潤厚實陰影與大地色細邊框 */
      .card {
        background: #ffffff;
        border: 1px solid var(--cream-300);
        border-radius: var(--radius-md);
        padding: 2.5rem 2.2rem;
        width: 100%;
        max-width: 390px;
        box-shadow: var(--shadow-md);
      }

      /* 標題與副標題字體顏色調整 */
      h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--brown-dark);
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      p.sub {
        font-size: 14px;
        color: var(--brown-light);
        margin-bottom: 1.8rem;
      }
      label {
        font-size: 13px;
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        color: var(--brown-mid);
      }

      /* ⌨️ 輸入框：柔和暖棕色外框與 Focus 呼吸發光特效 */
      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--cream-300);
        background-color: var(--cream-100);
        border-radius: var(--radius-sm);
        font-size: 14px;
        color: var(--brown-dark);
        outline: none;
        transition: all 0.2s ease;
      }
      input[type="email"]::placeholder,
      input[type="password"]::placeholder,
      input[type="text"]::placeholder {
        color: var(--brown-light);
        opacity: 0.6;
      }
      input:focus {
        border-color: var(--brown-mid);
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(112, 98, 97, 0.1);
      }

      .field {
        margin-bottom: 1.2rem;
      }

      /* 🪵 按鈕：深可可主色按鈕與微動懸浮反饋 */
      .btn {
        width: 100%;
        padding: 11px;
        background: var(--brown-dark);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        margin-top: 0.6rem;
        transition: all 0.2s ease;
        box-shadow: 0 2px 4px rgba(74, 62, 61, 0.15);
      }
      .btn:hover {
        background: var(--brown-mid);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(74, 62, 61, 0.2);
      }
      .btn:active {
        transform: translateY(0);
      }

      /* 🔔 全域錯誤提示框（柔和暖紅） */
      .alert {
        font-size: 13px;
        padding: 11px 14px;
        border-radius: var(--radius-sm);
        margin-bottom: 1.2rem;
        font-weight: 500;
      }
      .alert-error {
        background: #fff5f5;
        color: #c53030;
        border: 1px solid #feb2b2;
      }

      /* ⚠️ 輸入框下方的後端驗證欄位錯誤提示（草莓奶油色） */
      .field-error {
        font-size: 12px;
        color: #e53e3e;
        background-color: #fff5f5;
        padding: 4px 8px;
        border-radius: 4px;
        margin-top: 5px;
        display: inline-block;
        font-weight: 500;
      }

      /* 下方引導連結：與登入頁面完全一致 */
      .link-row {
        font-size: 13px;
        color: var(--brown-mid);
        text-align: center;
        margin-top: 1.5rem;
      }
      .link-row a {
        color: var(--brown-dark);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px dashed var(--brown-light);
        padding-bottom: 2px;
      }
      .link-row a:hover {
        color: var(--brown-mid);
        border-bottom-style: solid;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🐾 建立帳號</h1>
      <p class="sub">填寫資料，立即開始體驗慕沐村</p>

      <div
        class="alert alert-error"
        th:if="${errorMsg}"
        th:text="${errorMsg}"
      ></div>

      <form method="post" th:action="@{/auth/register/submit}">
        <div class="field">
          <label for="name">姓名</label>
          <input
            type="text"
            id="name"
            name="name"
            th:value="${registerRequest?.name}"
            placeholder="王小明"
            required
          />
          <div
            class="field-error"
            th:if="${#fields.hasErrors('registerRequest.name')}"
            th:errors="${registerRequest.name}"
          ></div>
        </div>

        <div class="field">
          <label for="username">Email（帳號）</label>
          <input
            type="email"
            id="username"
            name="username"
            th:value="${registerRequest?.username}"
            placeholder="you@example.com"
            required
          />
          <div
            class="field-error"
            th:if="${#fields.hasErrors('registerRequest.username')}"
            th:errors="${registerRequest.username}"
          ></div>
        </div>

        <div class="field">
          <label for="password">密碼（至少 6 個字元）</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••"
            minlength="6"
            required
          />
          <div
            class="field-error"
            th:if="${#fields.hasErrors('registerRequest.password')}"
            th:errors="${registerRequest.password}"
          ></div>
        </div>

        <button type="submit" class="btn">建立帳號</button>
      </form>

      <div class="link-row">已有帳號？ <a href="/auth/login">直接登入</a></div>
    </div>
  </body>
</html>
