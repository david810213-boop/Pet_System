<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
  <head
    th:replace="~{fragments/header :: common-head('新增寵物 | 寵物美容系統')}"
  ></head>
  <body>
    <div class="page-wrapper">
      <div th:replace="~{fragments/nav :: nav}"></div>
      <div class="content">
        <h2>新增寵物</h2>
        <div
          class="alert-error"
          th:if="${errorMsg}"
          th:text="${errorMsg}"
        ></div>
        <div class="card">
          <form method="post" action="/pets/submit">
            <div class="field">
              <label>寵物名稱 *</label>
              <input
                type="text"
                name="name"
                th:value="${petRequest?.name}"
                placeholder="小白"
                required
              />
            </div>
            <div class="field">
              <label>寵物類型 *</label>
              <select name="petType" required>
                <option value="" disabled selected>請選擇</option>
                <option
                  th:each="t : ${petTypes}"
                  th:value="${t.name()}"
                  th:text="${t.description}"
                  th:selected="${petRequest?.petType?.name() == t.name()}"
                ></option>
              </select>
            </div>
            <div class="field">
              <label>品種 *</label>
              <input
                type="text"
                name="breed"
                th:value="${petRequest?.breed}"
                placeholder="柴犬"
                required
              />
            </div>
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"
            >
              <div class="field">
                <label>體重 (kg) *</label>
                <input
                  type="number"
                  name="weight"
                  th:value="${petRequest?.weight}"
                  step="0.1"
                  min="0.1"
                  required
                />
              </div>
              <div class="field">
                <label>年齡 (歲) *</label>
                <input
                  type="number"
                  name="age"
                  th:value="${petRequest?.age}"
                  min="0"
                  required
                />
              </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 0.5rem">
              <button type="submit" class="btn">新增寵物</button>
              <a href="/pets" class="btn btn-outline">取消</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
