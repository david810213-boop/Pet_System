spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:petdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[hibernate.format_sql]": true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

# 日誌配置（開發環境輸出較多細節）
logging:
  level:
    "[com.example.parking]": DEBUG
    "[org.springframework.web]": INFO
    "[org.hibernate]": INFO

server:
  port: 8081
